name: Flight Price Monitor

# This project runs the monitor locally (e.g. cron on a Raspberry Pi); state.json
# and responses.jsonl are kept local only and are never committed to the repo.
# This workflow is therefore manual-only (workflow_dispatch) as an optional
# connectivity/smoke test — it does NOT run on a schedule (so it can't
# double-spend the SerpAPI budget against the local cron) and it does NOT persist
# or commit any data back to GitHub.
on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed routes from template
        # routes.json is gitignored (personal config), so a fresh checkout has
        # only the template. The smoke test exercises the example routes.
        run: cp routes.example.json routes.json

      - name: Run flight monitor
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CURRENCY: ${{ vars.CURRENCY || 'USD' }}
          TIMEZONE: ${{ vars.TIMEZONE || 'America/New_York' }}
          ACTIVE_START: ${{ vars.ACTIVE_START || '7' }}
          ACTIVE_END: ${{ vars.ACTIVE_END || '22' }}
          ALERT_THRESHOLD_PCT: ${{ vars.ALERT_THRESHOLD_PCT || '3' }}
          MONTHLY_CALL_CAP: ${{ vars.MONTHLY_CALL_CAP || '240' }}
        run: python flight_monitor.py
